<!doctype html>
<html lang="en">
  <head>

          <a href="../CSS/css_Layout1.css"

              height="50px"
              alt="book"
          /></a>
        </div>
        <div class="shop">
          <h1><u>BooK Shopieee</u></h1>
        </div>
      </div>
      <div class="menu">

          <li><a href="">Home</a></li>

          <li><a href="">About</a></li>
          <li><a href="">Product</a></li>
          <li><a href="">Contact</a></li>

      <div class="slider">

            <li>

        <div class="mainimg">
          <a
            href="https://www.amazon.in/Books/b?ie=UTF8&node=976389031"
            target="_blank"
            ><img
              src="../img/Screenshot 2026-03-11 025544.png"
